name: Web CI

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
      - "supabase/**"
  push:
    branches:
      - main
      - v2-product-foundation
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
      - "supabase/**"

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-quality-gate:
    name: Web quality gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent

      - name: Commit generated package lock
        if: github.event_name == 'push' && github.ref == 'refs/heads/v2-product-foundation'
        working-directory: .
        run: |
          if ! git diff --quiet -- apps/web/package-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/web/package-lock.json
            git commit -m "chore(v2): add web package lock"
            git push origin HEAD:v2-product-foundation
          fi

      - name: Upload generated package lock
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-package-lock
          path: apps/web/package-lock.json
          if-no-files-found: ignore

      - name: Typecheck
        run: npm run typecheck -- --pretty false 2>&1 | tee typecheck.log

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-typecheck-log
          path: apps/web/typecheck.log
          if-no-files-found: ignore

      - name: Build
        run: npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-log
          path: apps/web/build.log
          if-no-files-found: ignore
